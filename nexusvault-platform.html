// ─── STAT COUNTER ──────────────────────────────────────────────────────────────
const StatCounter = ({ target, prefix="", suffix="", duration=2200, color=T.gold }) => {
  const [val, setVal] = useState(0);
  const [started, setStarted] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if(e.isIntersecting && !started) setStarted(true); }, { threshold:.3 });
    if(ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [started]);

  useEffect(() => {
    if(!started) return;
    let startTime = null;
    const step = (ts) => {
      if(!startTime) startTime = ts;
      const prog = Math.min((ts - startTime)/duration, 1);
      setVal(Math.floor(prog * target));
      if(prog < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [started, target, duration]);

  return (
    <span ref={ref} style={{fontFamily:"'Cabinet Grotesk',sans-serif",fontWeight:900,color}}>
      {prefix}{val >= 1000 ? val.toLocaleString() : val}{suffix}
    </span>
  );
};

  ]);
  const [input, setInput] = useState("");
  const [typing, setTyping] = useState(false);
  const endRef = useRef(null);

  const REPLIES = {
    "deposit": "To deposit: Dashboard → Deposit → select coin → copy your wallet address → send crypto → submit TXID. You'll receive an instant email confirmation on-chain!",
    "withdraw": "Dashboard → Withdraw → select coin → enter wallet address & amount → submit 2FA code. Processed in 24–48h with email updates at each stage.",

    "referral": "Earn 10% on every deposit your referrals make. Find your unique referral link in Dashboard → Referral. Commissions credited instantly!",

const nodemailer = require('nodemailer');
const hbs = require('handlebars');

const transporter = nodemailer.createTransport({
  host: 'smtp.sendgrid.net',
  port: 587,
  auth: {
    user: process.env.SMTP_USER,
    pass: process.env.SMTP_PASS
  }
});

async function sendDepositConfirm(user, dep) {
  const lang = user.language || 'en';
  const tmpl = getTemplate(lang, 'deposit-confirmed');
  const html = hbs.compile(tmpl)({
    name: user.name,
    amount: dep.amountUSD,
    coin: dep.coin,
    txHash: dep.txHash,
    plan: dep.planName,
  });
  await transporter.sendMail({
    from: 'NexusVault <noreply@nexusvault.io>',
    to: user.email,
    subject: \`✅ Deposit Confirmed — $\${dep.amountUSD}\`,
    html
  });
}`}</CodeBlock>

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("landing");
  const [currentLang, setCurrentLang] = useState(LANGS[0]);

  useEffect(() => {
    const styleEl = document.createElement("style");
    styleEl.textContent = CSS;
    document.head.appendChild(styleEl);
    return () => document.head.removeChild(styleEl);
  }, []);

  const navTo = useCallback((p) => {
    setPage(p);
    window.scrollTo(0, 0);
  }, []);

  if(page === "dashboard") return <Dashboard setPage={navTo}/>;
  if(page === "admin")     return <Admin setPage={navTo}/>;
  if(page === "chat")      return <ChatPage setPage={navTo}/>;
  if(page === "login")     return <AuthPage mode="login" setPage={navTo}/>;
  if(page === "register")  return <AuthPage mode="register" setPage={navTo}/>;
  if(page === "docs")      return <DocsPage setPage={navTo}/>;

  return (
    <div style={{minHeight:"100vh",background:T.bg}}>
      <Navbar page={page} setPage={navTo}/>
      <LandingPage setPage={navTo} currentLang={currentLang} setCurrentLang={setCurrentLang}/>
    </div>
  );
}

// Mount the app
const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(React.createElement(App));
